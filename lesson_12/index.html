<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="css/bootstrap.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="shortcut icon" href="img/01.png" type="favicon.icon">
	<meta charset="UTF-8">
	<title>Сайт на Bootstrap</title>
</head>
<body>
	<div class="container">
		<div class="section">
			<!-- Первый row строка под заголовок -->
			<div class="row">
				<div class="col-lg-6 offset-lg-3" >
					<h1 class="header text-center"> 
						<span>Получите видео-инструкцию</span>
						<strong class="text-uppercase">Как заработать свой первый миллион</strong>
					</h1>
				</div>
			</div>
			<!-- Второй row под видео и форму -->
			<div class="row">
				<div class="col-lg-6 offset-lg-1 col-md-8 offset-md-2">
					<div class="video"><iframe width="100%" height="315" src="https://www.youtube.com/embed/ayVLjyWqMCs" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
					</div>
				</div>
				<div class="col-lg-4 offset-lg-0 col-md-8 offset-md-2">
					<div class="form">
						<p class="form-header text-center">Введите свой email</p>
						<form action="#">
							<input type="text" class="form-control input-lg" placeholder="Ваше имя" >
							<input type="text" class="form-control input-lg" placeholder="Ваш email">
							<button class="btn btn-primary btn-lg btn-block form-btn">Получите инструкцию</button>
						</form>	
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="container">
		<div class="section">
		<!-- row под заголовок секции -->
		<div class="row">
			<div class="col-lg-12 col-xs-12 col-sm-12">
				<h2 class="section-header text-center text-uppercase">Почему нужно сделать это сейчас?</h2>
			</div>
		</div>
		<div class="feature text-center">
					<div class="row">
						<div class="col-lg-3 col-md-6">
							<div class="feature-box">
								<img src="img/01.png" alt="Первое преимущество" width="100"
	height="100">
								<p>Первое преимущество</p>
							</div>
						</div>
						<div class="col-lg-3 col-md-6">
							<div class="feature-box">
								<img src="img/02.png" alt="Второе преимущество" width="100"
	height="100">
								<p>Второе преимущество</p>
							</div>
						</div>
						<div class="col-lg-3 col-md-6">
							<div class="feature-box">
								<img src="img/03.png" alt="Третье преимущество" width="100"
	height="100">
								<p>Третье преимущество</p>
							</div>
						</div>
						<div class="col-lg-3 col-md-6">
							<div class="feature-box">
								<img src="img/04.png" alt="Четвертое преимущество" width="100"
	height="100">
								<p>Четвертое преимущество</p>
							</div>
						</div>
					</div>
						<button class="btn btn-primary btn-lg form-btn center-block">Получите инструкцию</button>
			</div>
		</div>
		<!-- Кнопка получить инструкцию -->
	</div>
	
</body>
</html>
